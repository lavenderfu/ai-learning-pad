<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3岁启蒙 AI 学习平板</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrolling on tablet */
            background-color: #f0f4f8;
            touch-action: none; /* Prevent double-tap zoom etc */
        }
        
        /* Parent Dashboard */
        #parent-dashboard {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        .dashboard-left {
            width: 40%;
            background-color: #ffffff;
            padding: 30px;
            box-sizing: border-box;
            border-right: 2px solid #e2e8f0;
        }
        
        .dashboard-right {
            width: 60%;
            background-color: #f8fafc;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        h1, h2 { color: #334155; }
        
        .stat-card {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #3b82f6;
        }
        
        .input-group {
            margin-bottom: 30px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            box-sizing: border-box;
            margin-top: 10px;
        }
        
        .btn-start {
            background-color: #22c55e;
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(34, 197, 94, 0.3);
            transition: transform 0.1s;
        }
        
        .btn-start:active {
            transform: translateY(2px);
        }
        
        .cloud-sync {
            margin-top: 15px;
            color: #64748b;
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        
        .cloud-icon {
            color: #3b82f6;
            margin-right: 8px;
        }

        /* Child Learning UI */
        #child-learning {
            display: none;
            width: 100%;
            height: 100%;
            background-color: #ffedd5;
            position: relative;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .question-title {
            font-size: 48px;
            color: #431407;
            margin-bottom: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .speaker-icon {
            background-color: #f97316;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #c2410c;
        }
        
        .speaker-icon:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        .options-container {
            display: flex;
            gap: 40px;
        }
        
        .option-card {
            width: 200px;
            height: 200px;
            background-color: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            color: #1e293b;
            box-shadow: 0 8px 0 #cbd5e1;
            cursor: pointer;
            user-select: none;
        }
        
        .option-card:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        
        .option-card.correct {
            background-color: #4ade80;
            color: white;
            box-shadow: 0 8px 0 #16a34a;
        }
        
        .option-card.wrong {
            background-color: #f87171;
            color: white;
            box-shadow: 0 8px 0 #dc2626;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        
        /* Parent Lock */
        .parent-lock {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0.5;
            user-select: none;
        }
        
        /* Lock Modal */
        #lock-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            font-size: 24px;
        }
        
        .math-problem {
            font-size: 36px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .modal-content input {
            font-size: 28px;
            width: 150px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .btn-unlock {
            background-color: #ef4444;
            color: white;
            padding: 10px 30px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
        }
        
        /* Celebration overlay */
        #celebration {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.9);
            z-index: 90;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }
    </style>
</head>
<body>

    <!-- Parent Dashboard -->
    <div id="parent-dashboard">
        <div class="dashboard-left">
            <h2>📊 学习看板</h2>
            <div class="stat-card">
                <div>昨日正确率</div>
                <div class="stat-value">85%</div>
            </div>
            <div class="stat-card">
                <div>AI 分析：</div>
                <div style="margin-top: 10px; color: #475569; line-height: 1.5;">
                    宝宝对数字「3」的认知已达标。<br>
                    建议今天进行「数字 4 和 5」的认知，同时复习「大小概念」。
                </div>
            </div>
        </div>
        
        <div class="dashboard-right">
            <h1>🚀 今日学习任务</h1>
            
            <div class="input-group">
                <label style="font-size: 20px; font-weight: bold; color: #334155;">设置学习主题：</label>
                <input type="text" id="topic-input" value="认识数字 4，以及汉字 大和小" placeholder="例如：认识苹果，或者练习 1-5">
                
                <div class="cloud-sync">
                    <span class="cloud-icon">☁️</span>
                    <span>已同步来自云端远程配置：[异地爸爸配置的主题]</span>
                </div>
            </div>
            
            <button class="btn-start" onclick="startLearning()">进入沉浸学习</button>
            <div style="text-align: center; margin-top: 20px; color: #94a6b8;">点击后将全屏锁定，需解数学题退出</div>
        </div>
    </div>

    <!-- Child Learning Interface -->
    <div id="child-learning">
        <div class="parent-lock" id="lock-btn">🔒</div>
        
        <div class="question-title">
            <div class="speaker-icon" onclick="playAudio()">🔊</div>
            哪个是数字 "4" ？
        </div>
        
        <div class="options-container">
            <div class="option-card" onclick="checkAnswer(this, false)">3</div>
            <div class="option-card" onclick="checkAnswer(this, true)">4</div>
            <div class="option-card" onclick="checkAnswer(this, false)">2</div>
        </div>
    </div>
    
    <!-- Celebration -->
    <div id="celebration">
        <div>🌟🌟🌟</div>
        <div style="font-size: 40px; color: #f97316; font-weight: bold; margin-top: 20px;">太棒啦！</div>
    </div>

    <!-- Parent Lock Modal -->
    <div id="lock-modal">
        <div class="modal-content">
            <div style="color: #64748b; font-size: 18px;">家长解锁验证</div>
            <div class="math-problem">4 × 7 = ?</div>
            <input type="number" id="math-answer" placeholder="输入答案">
            <br>
            <button class="btn-unlock" onclick="verifyUnlock()">解锁退出</button>
            <button class="btn-unlock" style="background-color: #cbd5e1; margin-left: 10px;" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        // Start learning session
        function startLearning() {
            document.getElementById('parent-dashboard').style.display = 'none';
            document.getElementById('child-learning').style.display = 'flex';
            // In a real app, this would request full screen
            try {
                document.documentElement.requestFullscreen();
            } catch(e) {}
            
            setTimeout(playAudio, 500); // Auto play sound on entry
        }

        // Mock audio play
        function playAudio() {
            const speaker = document.querySelector('.speaker-icon');
            speaker.style.transform = 'scale(1.1)';
            setTimeout(() => { speaker.style.transform = 'scale(1)'; }, 200);
            // Here would be actual TTS playback
        }

        // Check Answer Logic
        function checkAnswer(element, isCorrect) {
            if (isCorrect) {
                element.classList.add('correct');
                playAudio(); // play happy sound
                
                setTimeout(() => {
                    document.getElementById('celebration').style.display = 'flex';
                    setTimeout(() => {
                        // Reset for demo purposes
                        document.getElementById('celebration').style.display = 'none';
                        element.classList.remove('correct');
                    }, 2000);
                }, 500);
            } else {
                element.classList.add('wrong');
                setTimeout(() => {
                    element.classList.remove('wrong');
                }, 600);
            }
        }

        // Long Press Lock Logic
        let pressTimer;
        const lockBtn = document.getElementById('lock-btn');
        
        lockBtn.addEventListener('touchstart', startPress);
        lockBtn.addEventListener('mousedown', startPress);
        
        lockBtn.addEventListener('touchend', cancelPress);
        lockBtn.addEventListener('mouseup', cancelPress);
        lockBtn.addEventListener('mouseleave', cancelPress);

        function startPress(e) {
            e.preventDefault();
            lockBtn.style.opacity = '1';
            lockBtn.style.backgroundColor = 'rgba(255,255,255,0.8)';
            pressTimer = window.setTimeout(() => {
                document.getElementById('lock-modal').style.display = 'flex';
                document.getElementById('math-answer').value = '';
            }, 1500); // 1.5 seconds hold for demo (usually 3s)
        }

        function cancelPress() {
            clearTimeout(pressTimer);
            lockBtn.style.opacity = '0.5';
            lockBtn.style.backgroundColor = 'rgba(255,255,255,0.4)';
        }

        function closeModal() {
            document.getElementById('lock-modal').style.display = 'none';
        }

        function verifyUnlock() {
            const ans = document.getElementById('math-answer').value;
            if (ans === '28') {
                document.getElementById('lock-modal').style.display = 'none';
                document.getElementById('child-learning').style.display = 'none';
                document.getElementById('parent-dashboard').style.display = 'flex';
                try {
                    document.exitFullscreen();
                } catch(e) {}
            } else {
                alert("答案错误！");
                document.getElementById('math-answer').value = '';
            }
        }
    </script>
</body>
</html>
