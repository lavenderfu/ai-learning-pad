<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的资产 - 智创</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部公告栏 -->
    <div id="notice-bar" class="notice-bar">
        <div class="notice-content">
            <div class="marquee-container vertical-marquee" id="marquee-text">
                <!-- 由 config.js 动态渲染 -->
            </div>
        </div>
        <button class="notice-close" onclick="closeNotice()">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
        </button>
    </div>

    <!-- 顶栏 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <a href="index.html"><span>智创</span></a>
            </div>
            <div class="header-actions">
                <!-- 由 config.js 动态渲染 -->
            </div>
        </div>
    </header>

    <!-- 固定左侧悬浮菜单 -->
    <nav class="fixed-side-nav">
        <ul>
            <!-- 由 config.js 动态渲染 -->
        </ul>
    </nav>

    <div class="layout page-layout">
        <main class="main-content subpage-content">
            <div class="page-header">
                <h2 class="page-title">我的资产</h2>
            </div>

            <div class="assets-container">
                <!-- 顶栏：一级分类 和 搜索 -->
                <div class="assets-toolbar">
                    <div class="tabs primary-tabs">
                        <button class="tab-btn active">全部</button>
                        <button class="tab-btn">漫剧创作</button>
                        <button class="tab-btn">小说创作</button>
                        <button class="tab-btn">解说视频</button>
                        <button class="tab-btn">提示词提取</button>
                        <button class="tab-btn">其他</button>
                    </div>
                    <div class="search-box">
                        <input type="text" placeholder="按名称/时间搜索">
                        <button class="search-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- 二级分类 (资产类型) -->
                <div class="tabs secondary-tabs">
                    <button class="tab-btn active">作品</button>
                    <button class="tab-btn">人物 (3)</button>
                    <button class="tab-btn">场景 (12)</button>
                    <button class="tab-btn">特效 (5)</button>
                </div>

                <!-- 资产列表表格 -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>资源预览</th>
                                <th>资源名称</th>
                                <th>所属功能</th>
                                <th>资产类型</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><div class="table-img-ph" style="background:#e0c3fc;"></div></td>
                                <td>赛博女战士_终极版.mp4</td>
                                <td>漫剧创作</td>
                                <td><span class="type-tag">作品</span></td>
                                <td>2024-03-01 14:30</td>
                                <td>
                                    <button class="action-link">查看</button>
                                    <button class="action-link">下载</button>
                                </td>
                            </tr>
                            <tr>
                                <td><div class="table-img-ph" style="background:#f093fb;"></div></td>
                                <td>星辰大海_主角预设</td>
                                <td>小说创作</td>
                                <td><span class="type-tag">人物</span></td>
                                <td>2024-02-28 09:15</td>
                                <td>
                                    <button class="action-link">查看</button>
                                    <button class="action-link">编辑</button>
                                </td>
                            </tr>
                            <tr>
                                <td><div class="table-img-ph" style="background:#5ee7df;"></div></td>
                                <td>未来都市夜景图_高清</td>
                                <td>漫剧创作</td>
                                <td><span class="type-tag">场景</span></td>
                                <td>2024-02-25 11:20</td>
                                <td>
                                    <button class="action-link">查看</button>
                                    <button class="action-link">下载</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分页 -->
                <div class="pagination">
                    <button class="page-btn" disabled><</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <span class="page-dots">...</span>
                    <button class="page-btn">10</button>
                    <button class="page-btn">></button>
                </div>
            </div>
        </main>
    </div>

    <!-- 右侧悬浮按钮 -->
    <div class="floating-right" onclick="openModal('money-modal')">
        <!-- 由 config.js 动态渲染 -->
    </div>

    <!-- 赚钱攻略弹窗 -->
    <div id="money-modal" class="modal-overlay" onclick="closeModal(event, 'money-modal')">
        <div class="modal-content lg-modal">
            <div class="modal-header">
                <h3>创作者变现指南</h3>
                <button class="close-btn" onclick="closeModal(event, 'money-modal', true)">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 由 config.js 动态渲染 -->
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
