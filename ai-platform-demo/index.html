<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智创 - AI 创作平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部公告栏 (上下滚动) -->
    <div id="notice-bar" class="notice-bar">
        <div class="notice-content">
            <div class="marquee-container vertical-marquee" id="marquee-text">
                <!-- 由 config.js 动态渲染 -->
            </div>
        </div>
        <button class="notice-close" onclick="closeNotice()">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
        </button>
    </div>

    <!-- 顶栏 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>智创</span>
            </div>
            <div class="header-actions">
                <!-- 由 config.js 动态渲染 -->
            </div>
        </div>
    </header>

    <!-- 固定左侧悬浮菜单 -->
    <nav class="fixed-side-nav">
        <ul>
            <!-- 由 config.js 动态渲染 -->
        </ul>
    </nav>

    <div class="layout">
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 核心功能区 -->
            <section id="section-hero" class="section">
                <h2 class="section-title">今天创作点什么？</h2>
                <div class="grid-main">
                    <!-- 由 config.js 动态渲染 -->
                </div>
            </section>

            <!-- 更多特色功能 -->
            <section id="section-features" class="section">
                <h2 class="section-title">更多特色功能</h2>
                <div class="grid-features">
                    <!-- 由 config.js 动态渲染 -->
                </div>
            </section>

            <!-- 灵感广场 -->
            <section id="section-inspiration" class="section">
                <h2 class="section-title">灵感广场</h2>

                <div class="tabs">
                    <!-- 由 config.js 动态渲染 -->
                </div>

                <div class="tab-content active" id="tab-content-area">
                    <div class="masonry-grid">
                        <!-- 由 config.js 动态渲染 -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 右侧悬浮按钮 -->
    <div class="floating-right" onclick="openModal('money-modal')">
        <!-- 由 config.js 动态渲染 -->
    </div>

    <!-- 赚钱攻略弹窗 -->
    <div id="money-modal" class="modal-overlay" onclick="closeModal(event, 'money-modal')">
        <div class="modal-content lg-modal">
            <div class="modal-header">
                <h3>创作者变现指南</h3>
                <button class="close-btn" onclick="closeModal(event, 'money-modal', true)">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 由 config.js 动态渲染 -->
            </div>
        </div>
    </div>

    <!-- 作品详情弹窗 -->
    <div id="work-modal" class="modal-overlay" onclick="closeModal(event, 'work-modal')">
        <div class="modal-content lg-modal">
            <div class="modal-header">
                <h3>作品详情</h3>
                <button class="close-btn" onclick="closeModal(event, 'work-modal', true)">&times;</button>
            </div>
            <div class="modal-body work-detail-layout">
                <div class="work-preview">
                    <div class="preview-img-placeholder"></div>
                </div>
                <div class="work-info">
                    <h4 class="work-title">作品标题</h4>
                    <div class="work-meta">
                        <!-- 由 config.js 动态渲染 -->
                    </div>
                    <div class="prompt-box">
                        <!-- 由 config.js 动态渲染 -->
                    </div>
                    <div class="action-box">
                        <!-- 由 config.js 动态渲染 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
